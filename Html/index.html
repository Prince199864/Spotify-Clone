<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Your favourite music is here</title>
    <link rel="stylesheet" href="/Css/style.css">

</head>

<body>
    <nav id="navbar">
        <ul>
            <li class="brand"> <img src="/Images/spotify-g2e23fb7d4_1280.jpg" alt="Spotify">Spotify</li>
            <li class="items"><a href="#">Home</a></li>
            <li class="items"><a href="#">About</a></li>
            <li class="items"><a href="#">Favourite Artists</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="songList">
            <h1>Best of NCS- No Copyright Sounds</h1>
            <div class="songItemContainer">
                <div class="songItem">
                    <img src="/Images/1.jpg" alt="1">
                    <span>Let me love You</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/2.jpg" alt="1">
                    <span>The story of my life</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/3.jpg" alt="1">
                    <span>Dance Tonight</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/4.jpg" alt="1">
                    <span>The dance master</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/5.jpg" alt="1">
                    <span>Fallen</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/6.jpg" alt="1">
                    <span>Move it</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div> <div class="songItem">
                    <img src="/Images/7.jpg" alt="1">
                    <span>Let me love Your passion</span>
                    <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
                </div>
            </div> <div class="songItem">
                <img src="/Images/8.jpg" alt="1">
                <span>Dance Bish</span>
                <span class="songListplay"><span class="timestamp">05:34 <i class="fa-sharp fa-solid fa-circle-play"></i></span></span>
            </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>
    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" max="100">
        <div class="icons">
            <!-- fontawesome icons -->
            <i class="fa-solid fa-2x fa-backward-step"></i>
            <i class="fa-sharp fa-2x fa-solid fa-circle-play"></i>
            <i class="fa-solid fa-2x fa-forward-step"></i>

        </div>
        <div class="songInfo">
            <img src="/Images/playing.gif" alt="playing"> Let me love you
        </div>
    </div>
    <script src="https://kit.fontawesome.com/6145215663.js" crossorigin="anonymous"></script>
    <script src="/Javascript/script.js"></script>
</body>

</html>
